steps:
  publish:
    image: node:alpine
    when:
      - event: push
        branch: sources
    secrets: [ PAGES_ACCESS_TOKEN, MAIL ]
    commands:
      - apk add --no-cache git

      - npm install
      - npm run build

      - cd dist
      - git init
      - git config user.name "${CI_REPO_OWNER}"
      - git config user.email "${MAIL}"
      - git branch -M main
      - git add .
      - git remote add origin "https://${PAGES_ACCESS_TOKEN}@codeberg.org/${CI_REPO}.git"
      - git commit -m "Update ${CI_COMMIT_SHA:-}"
      - git push --force -u origin main
